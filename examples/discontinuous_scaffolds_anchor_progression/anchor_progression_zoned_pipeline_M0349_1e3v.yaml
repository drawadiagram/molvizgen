# Two-panel row: the discontinuous-scaffolds design progression for
# M0349_1e3v (see anchor_progression_pipeline_M0349_1e3v.yaml for the
# original, single-color-cartoon version of this figure), re-rendered with
# ../../figures/anchor_progression_zoned_figure.py instead of
# ../../figures/motif_superposition_figure.py to make the anchor residues easier to
# visually track between panels:
#   - Both panels share ONE fixed camera orientation - looking straight down
#     on the best-fit plane through the *initial* (root) design's own motif
#     residues - rather than each panel independently re-orienting itself.
#   - Protein is colored by distance from the motif rather than a flat
#     color: residues within 3 Angstroms are opaque yellow cartoon;
#     everything farther is a translucent (50%) white surface.
#   - Motif hot-spot residues are pink; the anchor residues (identified at
#     the root generation, A40/A100) are green.
#
# Prerequisite: panel_specs/M0349_1e3v_initial.json / _final.json must
# already exist (see anchor_progression_pipeline_M0349_1e3v.yaml's header
# comment: `./resolve_progression.sh M0349_1e3v`).
#
# Then, run from this directory:
#   cd examples/discontinuous_scaffolds_anchor_progression && python3 ../../run_pipeline.py anchor_progression_zoned_pipeline_M0349_1e3v.yaml

figure_name: molviz_anchor_progression
out_root: /home/mason/exdrive/rad/discontinuous_scaffolds/prod
steps:
  - name: panel_pair
    kind: render_pair
    args:
      script: figures/anchor_progression_zoned_figure.py
      reference: /home/mason/exdrive/rad/discontinuous_scaffolds/prod/molviz_anchor_progression/panel_specs/M0349_1e3v_initial.json
      design: /home/mason/exdrive/rad/discontinuous_scaffolds/prod/molviz_anchor_progression/panel_specs/M0349_1e3v_final.json
      width: 1800
      height: 1800
      out_reference: panel_initial_zoned_M0349_1e3v.png
      out_design: panel_final_zoned_M0349_1e3v.png

  - name: row
    kind: assemble
    args:
      images:
        - "${panel_pair.reference_image}"
        - "${panel_pair.design_image}"
      rows: 1
      cols: 2
      padding: 30
      trim_pad: 15
      target_width_in: 10
      out: anchor_progression_zoned_row_M0349_1e3v.png
