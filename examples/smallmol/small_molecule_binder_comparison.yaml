# Five-panel small-molecule-binder figure: a left "basic problem" panel
# (the target ligand alone, hot-spot atoms in red vs. the rest in yellow,
# per the RFDiffusion3 binder-design spec) next to a 2x2 grid of designs —
# top row: the best- and median-pLDDT designs from the nonadaptive reference
# campaign, bottom row: the same pick (best + median AF2 pLDDT) from the
# adaptive production campaign — one cherry-picked winner plus one
# representative-of-the-distribution design per campaign, not two winners.
# Both design rows carry the problem panel's red/yellow ligand hot-spot
# coloring through into the bound complex (same atoms, same colors, now
# next to the binder protein); the reference row's binder protein is green
# to set it apart from the skyblue production row.
#
# Run from this directory (points at campaign -2 by default):
#   cd examples/smallmol && python3 ../../run_pipeline.py small_molecule_binder_comparison.yaml
#
# Or point the same recipe at a different data root, e.g. campaign -1,
# without editing this file:
#   cd examples/smallmol && python3 ../../run_pipeline.py small_molecule_binder_comparison.yaml \
#     --root prod=/home/mason/exdrive/rad/smallmol/prod/small_molecule_binding-1 \
#     --root nonadaptive=/home/mason/exdrive/rad/smallmol/nonadaptive_reference/small_molecule_binding-1/small_molecule_binding

figure_name: molviz_binder_comparison
out_root: /home/mason/exdrive/rad/smallmol

data:
  nonadaptive: /home/mason/exdrive/rad/smallmol/nonadaptive_reference/small_molecule_binding-2
  prod: /home/mason/exdrive/rad/smallmol/prod/small_molecule_binding-2

steps:
  # --- left panel: the design problem itself -----------------------------
  - name: problem_panel
    kind: render
    args:
      script: figures/ligand_hotspot_figure.py
      input: "${data.prod}/p1_in/ALR_binder_design.json"
      task: partial
      width: 1600
      height: 1600
      out: problem_panel.png

  # --- top row: best + median (by AF2 pLDDT) nonadaptive-reference designs -
  - name: nonadaptive_find
    kind: find_smallmol
    args:
      campaign_root: "${data.nonadaptive}"
      campaign_label: nonadaptive

  - name: nonadaptive_pick
    kind: filter_top_n
    args:
      in: "${nonadaptive_find.manifest}"
      score_field: af2_plddt
      select: top_and_median

  - name: nonadaptive_figures
    kind: generate_each
    args:
      selection: "${nonadaptive_pick.manifest}"
      script: figures/generate_figure.py
      domain_color: green
      peptide_design_json: "${data.nonadaptive}/p1_in/ALR_binder_design.json"
      peptide_design_task: partial
      width: 1600
      height: 1600

  # --- bottom row: best + median (by AF2 pLDDT) production designs -------
  - name: prod_find
    kind: find_smallmol
    args:
      campaign_root: "${data.prod}"
      campaign_label: prod

  - name: prod_pick
    kind: filter_top_n
    args:
      in: "${prod_find.manifest}"
      score_field: af2_plddt
      select: top_and_median

  - name: prod_figures
    kind: generate_each
    args:
      selection: "${prod_pick.manifest}"
      script: figures/generate_figure.py
      domain_color: skyblue
      peptide_design_json: "${data.prod}/p1_in/ALR_binder_design.json"
      peptide_design_task: partial
      width: 1600
      height: 1600

  # --- final: left problem panel (1/3 width) + 2x2 design grid (2/3) -----
  # All four design panels are tiled in one build_montage() call (via
  # assemble_panel_layout's right_rows/right_cols) rather than two separate
  # per-row montages combined afterward: a shared call means every cell's
  # size (and therefore every panel's centering/padding) is computed from
  # the same rows x cols x 4 images, so the nonadaptive and prod rows read
  # with consistent spacing instead of each row's pair independently
  # setting its own cell size from only its own 2 images.
  - name: final
    kind: assemble_panel_layout
    args:
      left: "${problem_panel.image}"
      right:
        - "${nonadaptive_figures.pngs}"
        - "${prod_figures.pngs}"
      right_rows: 2
      right_cols: 2
      left_width_fraction: 0.333333
      padding: 25
      trim_pad: 15
      target_width_in: 10.5
      out: small_molecule_binder_comparison.png
